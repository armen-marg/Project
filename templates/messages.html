<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>?_Pardon_? · Сообщения</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    :root {
      --blue: #4a90d9;
      --purple: #7b5cfa;
      --pink: #ff2d55;
      --dark: #0a0e1a;
      --card: #111827;
      --nav-h: 62px;
      --top-h: 54px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Space Grotesk', sans-serif;
      user-select: none;
      position: fixed;
      inset: 0;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--top-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 200;
      background: rgba(0, 0, 0, .85);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255, 255, 255, .07);
    }

    .topbar-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: #fff;
      letter-spacing: 1.5px;
    }

    .topbar-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      border: 2px solid rgba(255, 255, 255, .25);
      box-shadow: 0 2px 10px rgba(74, 144, 217, .4);
      transition: transform .15s;
    }

    .topbar-avatar:active {
      transform: scale(.9);
    }

    .topbar-back {
      width: 36px;
      height: 36px;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, .7);
      transition: color .15s;
    }

    .topbar-back svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
    }

    .topbar-btn {
      width: 36px;
      height: 36px;
      background: rgba(255, 255, 255, .07);
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, .7);
      transition: background .15s, transform .15s;
    }

    .topbar-btn:active {
      background: rgba(255, 255, 255, .15);
      transform: scale(.92);
    }

    .topbar-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
    }

    /* ── SCREENS ── */
    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    .screen {
      position: absolute;
      inset: 0;
      top: var(--top-h);
      bottom: var(--nav-h);
      transform: translateX(100%);
      transition: transform .32s cubic-bezier(.32, .72, 0, 1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--dark);
    }

    .screen.active {
      transform: translateX(0);
    }

    .screen.slide-left {
      transform: translateX(-30%);
    }

    /* ── DM LIST ── */
    #screenDM {
      background: var(--dark);
    }

    .dm-search-wrap {
      padding: 12px 16px 8px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255, 255, 255, .05);
    }

    .dm-search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, .07);
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 14px;
      padding: 9px 14px;
    }

    .dm-search-box svg {
      width: 16px;
      height: 16px;
      stroke: rgba(255, 255, 255, .35);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      flex-shrink: 0;
    }

    .dm-search-box input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      color: #fff;
    }

    .dm-search-box input::placeholder {
      color: rgba(255, 255, 255, .3);
    }

    .dm-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    .dm-list::-webkit-scrollbar {
      display: none;
    }

    .dm-section-label {
      font-size: 10px;
      font-weight: 600;
      color: rgba(255, 255, 255, .25);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      padding: 12px 16px 6px;
    }

    .dm-thread {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255, 255, 255, .04);
      transition: background .15s;
      -webkit-tap-highlight-color: transparent;
    }

    .dm-thread:active {
      background: rgba(255, 255, 255, .04);
    }

    .dm-thread-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      position: relative;
    }

    .dm-thread-online {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: #22c55e;
      border: 2.5px solid var(--dark);
    }

    .dm-thread-info {
      flex: 1;
      min-width: 0;
    }

    .dm-thread-name {
      font-weight: 600;
      font-size: 14.5px;
      color: #fff;
    }

    .dm-thread-last {
      font-size: 12.5px;
      color: rgba(255, 255, 255, .4);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dm-thread-last.unread-msg {
      color: rgba(255, 255, 255, .75);
      font-weight: 500;
    }

    .dm-thread-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }

    .dm-thread-time {
      font-size: 11px;
      color: rgba(255, 255, 255, .3);
    }

    .dm-unread-badge {
      min-width: 20px;
      height: 20px;
      padding: 0 5px;
      background: var(--blue);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
    }

    .dm-empty {
      color: rgba(255, 255, 255, .25);
      font-size: 14px;
      text-align: center;
      padding: 60px 20px;
      line-height: 1.7;
    }

    .dm-empty-icon {
      font-size: 44px;
      display: block;
      margin-bottom: 14px;
    }

    /* ── NEW MESSAGE ── */
    .new-msg-btn {
      position: absolute;
      bottom: calc(var(--nav-h) + 20px);
      right: 18px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(74, 144, 217, .4);
      z-index: 50;
      transition: transform .15s, box-shadow .15s;
    }

    .new-msg-btn:active {
      transform: scale(.9);
      box-shadow: 0 2px 10px rgba(74, 144, 217, .3);
    }

    .new-msg-btn svg {
      width: 22px;
      height: 22px;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
    }

    /* ── CHAT ── */
    #screenChat {
      background: var(--dark);
    }

    .chat-header-top {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, .07);
      flex-shrink: 0;
    }

    .chat-header-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      position: relative;
    }

    .chat-header-online {
      position: absolute;
      bottom: 1px;
      right: 1px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22c55e;
      border: 2px solid var(--dark);
    }

    .chat-header-info {
      flex: 1;
    }

    .chat-header-name {
      font-weight: 700;
      font-size: 15px;
      color: #fff;
      line-height: 1;
    }

    .chat-header-status {
      font-size: 11px;
      color: #22c55e;
      margin-top: 3px;
    }

    .chat-header-actions {
      display: flex;
      gap: 8px;
    }

    .chat-action-btn {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: rgba(255, 255, 255, .06);
      border: 1px solid rgba(255, 255, 255, .08);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, .6);
      transition: background .15s;
    }

    .chat-action-btn:active {
      background: rgba(255, 255, 255, .12);
    }

    .chat-action-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .chat-messages::-webkit-scrollbar {
      display: none;
    }

    /* date divider */
    .chat-date-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
    }

    .chat-date-divider::before,
    .chat-date-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, .08);
    }

    .chat-date-divider span {
      font-size: 10.5px;
      color: rgba(255, 255, 255, .3);
      font-weight: 500;
      white-space: nowrap;
    }

    /* messages */
    .chat-msg-wrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .chat-msg-wrap.me {
      align-items: flex-end;
    }

    .chat-msg-wrap.them {
      align-items: flex-start;
    }

    .chat-msg {
      max-width: 72%;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      position: relative;
    }

    .chat-msg.me {
      background: linear-gradient(135deg, var(--blue), var(--purple));
      color: #fff;
      border-radius: 18px 18px 4px 18px;
    }

    .chat-msg.them {
      background: rgba(255, 255, 255, .09);
      color: rgba(255, 255, 255, .9);
      border-radius: 18px 18px 18px 4px;
    }

    .chat-msg-time {
      font-size: 10px;
      color: rgba(255, 255, 255, .3);
      padding: 0 4px;
      margin-top: 1px;
    }

    /* typing indicator */
    .chat-typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, .09);
      border-radius: 18px 18px 18px 4px;
      width: fit-content;
      margin-top: 4px;
    }

    .chat-typing span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .5);
      animation: typingDot .9s ease-in-out infinite;
    }

    .chat-typing span:nth-child(2) {
      animation-delay: .15s;
    }

    .chat-typing span:nth-child(3) {
      animation-delay: .3s;
    }

    @keyframes typingDot {

      0%,
      60%,
      100% {
        transform: translateY(0);
        opacity: .5;
      }

      30% {
        transform: translateY(-5px);
        opacity: 1;
      }
    }

    /* shared video card */
    .chat-video-card {
      max-width: 200px;
      border-radius: 14px;
      overflow: hidden;
      background: rgba(255, 255, 255, .08);
      border: 1px solid rgba(255, 255, 255, .1);
      cursor: pointer;
      transition: opacity .2s;
    }

    .chat-video-card:active {
      opacity: .75;
    }

    .chat-video-thumb {
      width: 100%;
      aspect-ratio: 9/16;
      background: linear-gradient(135deg, #111827, #0a0e1a);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .chat-video-thumb svg {
      width: 36px;
      height: 36px;
      fill: rgba(255, 255, 255, .6);
    }

    .chat-video-meta {
      padding: 8px 10px;
    }

    .chat-video-meta p {
      font-size: 11px;
      color: rgba(255, 255, 255, .6);
    }

    /* input bar */
    .chat-input-wrap {
      padding: 10px 12px;
      border-top: 1px solid rgba(255, 255, 255, .07);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .chat-input-extras {
      display: flex;
      gap: 6px;
    }

    .chat-extra-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, .5);
      flex-shrink: 0;
      transition: color .15s;
    }

    .chat-extra-btn:active {
      color: rgba(255, 255, 255, .9);
    }

    .chat-extra-btn svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
    }

    .chat-input-box {
      flex: 1;
      background: rgba(255, 255, 255, .07);
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 20px;
      padding: 9px 14px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      color: #fff;
      outline: none;
      resize: none;
      min-height: 38px;
      max-height: 100px;
      overflow-y: auto;
      line-height: 1.45;
      transition: border-color .2s;
    }

    .chat-input-box::placeholder {
      color: rgba(255, 255, 255, .3);
    }

    .chat-input-box:focus {
      border-color: rgba(74, 144, 217, .5);
    }

    .chat-input-box::-webkit-scrollbar {
      display: none;
    }

    .chat-send-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform .15s, opacity .2s;
      box-shadow: 0 2px 12px rgba(74, 144, 217, .35);
    }

    .chat-send-btn:active {
      transform: scale(.9);
    }

    .chat-send-btn.disabled {
      opacity: .4;
      pointer-events: none;
    }

    .chat-send-btn svg {
      width: 16px;
      height: 16px;
      stroke: #fff;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-around;
      background: rgba(0, 0, 0, .92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-top: 1px solid rgba(255, 255, 255, .07);
      z-index: 300;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      color: rgba(255, 255, 255, .4);
      padding: 6px 14px;
      transition: color .2s;
      background: none;
      border: none;
      position: relative;
      text-decoration: none;
    }

    .nav-btn.active {
      color: #fff;
    }

    .nav-btn svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-btn span {
      font-size: 10px;
      font-weight: 500;
      font-family: 'Space Grotesk', sans-serif;
    }

    .notif-badge {
      position: absolute;
      top: 3px;
      right: 10px;
      width: 16px;
      height: 16px;
      background: var(--pink);
      border-radius: 50%;
      font-size: 9px;
      font-weight: 700;
      color: #fff;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .notif-badge.show {
      display: flex;
    }

    .nav-upload {
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 4px 10px;
      text-decoration: none;
    }

    .nav-upload-inner {
      width: 46px;
      height: 32px;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 3px #000, 0 0 0 3.5px rgba(74, 144, 217, .35);
      transition: transform .15s;
    }

    .nav-upload:active .nav-upload-inner {
      transform: scale(.9);
    }

    .nav-upload-inner svg {
      width: 20px;
      height: 20px;
      stroke: #fff;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: calc(var(--nav-h) + 20px);
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(30, 30, 30, .95);
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      z-index: 9999;
      opacity: 0;
      transition: opacity .25s, transform .25s;
      white-space: nowrap;
      border: 1px solid rgba(255, 255, 255, .1);
      backdrop-filter: blur(10px);
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.error {
      border-color: rgba(255, 45, 85, .4);
      background: rgba(40, 10, 20, .95);
    }

    .toast.success {
      border-color: rgba(34, 197, 94, .4);
      background: rgba(10, 30, 20, .95);
    }

    /* ── NEW CHAT SHEET ── */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      z-index: 600;
      background: rgba(0, 0, 0, .6);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }

    .sheet-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .sheet {
      width: 100%;
      max-width: 540px;
      background: #131b2e;
      border-radius: 22px 22px 0 0;
      border-top: 1px solid rgba(255, 255, 255, .09);
      max-height: 75vh;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform .32s cubic-bezier(.32, .72, 0, 1);
    }

    .sheet-overlay.open .sheet {
      transform: translateY(0);
    }

    .sheet-handle {
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, .18);
      margin: 14px auto 0;
      flex-shrink: 0;
    }

    .sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, .07);
      flex-shrink: 0;
    }

    .sheet-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: #fff;
      letter-spacing: 1px;
    }

    .sheet-close {
      background: rgba(255, 255, 255, .07);
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: rgba(255, 255, 255, .6);
      font-size: 16px;
    }

    .sheet-search {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, .05);
      flex-shrink: 0;
    }

    .sheet-search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, .07);
      border-radius: 12px;
      padding: 9px 12px;
    }

    .sheet-search-box svg {
      width: 15px;
      height: 15px;
      stroke: rgba(255, 255, 255, .35);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
    }

    .sheet-search-box input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      color: #fff;
    }

    .sheet-search-box input::placeholder {
      color: rgba(255, 255, 255, .3);
    }

    .sheet-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0 20px;
    }

    .sheet-list::-webkit-scrollbar {
      display: none;
    }

    .sheet-user-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      cursor: pointer;
      transition: background .15s;
    }

    .sheet-user-row:active {
      background: rgba(255, 255, 255, .04);
    }

    .sheet-user-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .sheet-user-name {
      font-weight: 600;
      font-size: 14px;
      color: #fff;
    }

    .sheet-user-handle {
      font-size: 12px;
      color: rgba(255, 255, 255, .4);
      margin-top: 2px;
    }

    .sheet-empty {
      text-align: center;
      padding: 40px 20px;
      color: rgba(255, 255, 255, .3);
      font-size: 14px;
    }

    /* ── VIDEO MESSAGE CARD ── */
    .chat-msg-video {
      max-width: 240px;
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255, 255, 255, .06);
      border: 1px solid rgba(255, 255, 255, .1);
      cursor: pointer;
      transition: transform .15s, border-color .2s;
      align-self: flex-end;
    }

    .chat-msg-video.them {
      align-self: flex-start;
    }

    .chat-msg-video:active {
      transform: scale(.97);
    }

    .chat-msg-video:hover {
      border-color: rgba(74, 144, 217, .4);
    }

    .chat-video-thumb {
      width: 100%;
      aspect-ratio: 9/16;
      position: relative;
      background: #000;
      overflow: hidden;
    }

    .chat-video-thumb video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    .chat-video-play {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, .3);
      transition: background .2s;
    }

    .chat-msg-video:hover .chat-video-play {
      background: rgba(0, 0, 0, .15);
    }

    .chat-video-play svg {
      width: 44px;
      height: 44px;
      fill: rgba(255, 255, 255, .9);
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, .5));
    }

    .chat-video-info {
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-video-label {
      font-size: 12px;
      color: rgba(255, 255, 255, .5);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .chat-video-label svg {
      width: 13px;
      height: 13px;
      stroke: var(--blue);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
    }

    .chat-video-time {
      font-size: 10px;
      color: rgba(255, 255, 255, .3);
    }
  </style>
</head>

<body>

  <!-- TOPBAR (dynamic) -->
  <div class="topbar" id="topbar">
    <a href="/" class="topbar-back" id="topbarBack" style="text-decoration:none;">
      <svg viewBox="0 0 24 24">
        <line x1="19" y1="12" x2="5" y2="12" />
        <polyline points="12 19 5 12 12 5" />
      </svg>
    </a>
    <div class="topbar-title" id="topbarTitle">Сообщения</div>
    <div class="topbar-avatar" id="userAvatar">A</div>
  </div>

  <!-- APP -->
  <div id="app">

    <!-- DM LIST SCREEN -->
    <div class="screen active" id="screenDM">
      <div class="dm-search-wrap">
        <div class="dm-search-box">
          <svg viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" id="dmSearchInput" placeholder="Поиск сообщений..." />
        </div>
      </div>
      <div class="dm-list" id="dmList">
        <div class="dm-empty">
          <span class="dm-empty-icon">💬</span>
          Загрузка...
        </div>
      </div>

      <!-- FAB -->
      <button class="new-msg-btn" id="newMsgBtn" title="Новое сообщение">
        <svg viewBox="0 0 24 24">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
      </button>
    </div>

    <!-- CHAT SCREEN -->
    <div class="screen" id="screenChat">
      <div class="chat-header-top">
        <button class="topbar-back" id="chatBack" style="width:30px;height:30px;">
          <svg viewBox="0 0 24 24">
            <line x1="19" y1="12" x2="5" y2="12" />
            <polyline points="12 19 5 12 12 5" />
          </svg>
        </button>
        <div class="chat-header-avatar" id="chatAvatar">
          A
          <div class="chat-header-online"></div>
        </div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="chatName">Имя</div>
          <div class="chat-header-status">онлайн</div>
        </div>
        <div class="chat-header-actions">
          <button class="chat-action-btn" title="Видеозвонок">
            <svg viewBox="0 0 24 24">
              <polygon points="23 7 16 12 23 17 23 7" />
              <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
            </svg>
          </button>
          <button class="chat-action-btn" title="Информация">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="8" x2="12" y2="12" />
              <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
          </button>
        </div>
      </div>

      <div class="chat-messages" id="chatMessages"></div>

      <div class="chat-input-wrap">
        <div class="chat-input-row">
          <div class="chat-input-extras">
            <button class="chat-extra-btn" title="Прикрепить">
              <svg viewBox="0 0 24 24">
                <path
                  d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" />
              </svg>
            </button>
            <button class="chat-extra-btn" title="Медиа">
              <svg viewBox="0 0 24 24">
                <rect x="3" y="3" width="18" height="18" rx="2" />
                <circle cx="8.5" cy="8.5" r="1.5" />
                <polyline points="21 15 16 10 5 21" />
              </svg>
            </button>
          </div>
          <textarea class="chat-input-box" id="chatInput" placeholder="Написать сообщение..." rows="1"
            maxlength="1000"></textarea>
          <button class="chat-send-btn disabled" id="chatSendBtn">
            <svg viewBox="0 0 24 24">
              <line x1="22" y1="2" x2="11" y2="13" />
              <polygon points="22 2 15 22 11 13 2 9 22 2" />
            </svg>
          </button>
        </div>
      </div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a class="nav-btn" href="/">
      <svg viewBox="0 0 24 24">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
        <polyline points="9 22 9 12 15 12 15 22" />
      </svg>
      <span>Главная</span>
    </a>
    <a class="nav-btn" href="/search">
      <svg viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
      <span>Поиск</span>
    </a>
    <a class="nav-upload" href="/">
      <div class="nav-upload-inner">
        <svg viewBox="0 0 24 24">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
      </div>
    </a>
    <a class="nav-btn active" href="/messages">
      <svg viewBox="0 0 24 24">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
      </svg>
      <span>Сообщения</span>
      <div class="notif-badge" id="dmBadge"></div>
    </a>
    <a class="nav-btn" href="/notifications">
      <svg viewBox="0 0 24 24">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
      </svg>
      <span>Уведомления</span>
      <div class="notif-badge" id="notifBadge"></div>
    </a>
  </nav>

  <!-- NEW CHAT SHEET -->
  <div class="sheet-overlay" id="newChatSheet" onclick="handleSheetClick(event)">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <div class="sheet-title">Новое сообщение</div>
        <button class="sheet-close" onclick="closeNewChatSheet()">✕</button>
      </div>
      <div class="sheet-search">
        <div class="sheet-search-box">
          <svg viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" id="newChatSearch" placeholder="Найти пользователя..." />
        </div>
      </div>
      <div class="sheet-list" id="newChatList">
        <div class="sheet-empty">Начни вводить имя пользователя</div>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script>
    // ── UTILS ──
    function escapeHTML(str) {
      return (str || '').toString()
        .replaceAll('&', '&amp;').replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;').replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    let _toastTimer = null;
    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (type ? ' ' + type : '');
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => { t.className = 'toast'; }, 2800);
    }

    // ── SOCKET ──
    const socket = io();
    socket.on('connect', () => { socket.emit('join'); });
    socket.on('new_message', data => {
      if (currentChatUser && data.from_user_id === currentChatUser.userId) {
        // Определяем тип сообщения
        const vmatch = (data.text || '').trim().match(/.*\/video\/(\d+).*/);
        const msgType = vmatch ? 'video' : 'text';
        const videoId = vmatch ? parseInt(vmatch[1]) : null;
        appendMsg(data.text, false, 'сейчас', msgType, videoId);
      } else {
        loadDMList();
        showToast('Новое сообщение от @' + (data.username || ''));
      }
    });

    // ── SCREENS ──
    let currentChatUser = null;

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => {
        s.classList.remove('active', 'slide-left');
      });
      if (id === 'chat') {
        document.getElementById('screenDM').classList.add('slide-left');
        document.getElementById('screenChat').classList.add('active');
        updateTopbarForChat();
      } else {
        document.getElementById('screenDM').classList.add('active');
        updateTopbarForDM();
      }
    }

    function updateTopbarForDM() {
      document.getElementById('topbarBack').href = '/';
      document.getElementById('topbarTitle').textContent = 'Сообщения';
      document.getElementById('topbarBack').innerHTML = `<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="rgba(255,255,255,.7)" stroke-width="2" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>`;
    }

    function updateTopbarForChat() {
      if (!currentChatUser) return;
      document.getElementById('topbarTitle').textContent = '@' + currentChatUser.username;
    }

    document.getElementById('chatBack').addEventListener('click', () => {
      showScreen('dm');
    });

    // ── DM LIST ──
    let allThreads = [];
    let allFollowing = [];

    async function loadDMList() {
      try {
        const [threadsRes, profileRes] = await Promise.all([
          fetch('/api/dm/threads'),
          fetch('/api/profile')
        ]);
        allThreads = threadsRes.ok ? await threadsRes.json() : [];
        const profile = profileRes.ok ? await profileRes.json() : {};
        allFollowing = profile.following || [];
        renderThreads(allThreads);
      } catch (e) {
        document.getElementById('dmList').innerHTML = `
      <div class="dm-empty">
        <span class="dm-empty-icon">💬</span>
        Начни переписку с кем-нибудь!
      </div>`;
      }
    }

    function renderThreads(threads) {
      const list = document.getElementById('dmList');
      list.innerHTML = '';

      const threadUsernames = new Set(threads.map(t => t.username.toLowerCase()));
      const followingNoChat = allFollowing.filter(
        f => !threadUsernames.has(f.username.toLowerCase())
      );

      if (threads.length) {
        const label = document.createElement('div');
        label.className = 'dm-section-label';
        label.textContent = 'Сообщения';
        list.appendChild(label);
        threads.forEach(t => list.appendChild(buildThreadRow(t)));
      }

      if (followingNoChat.length) {
        const label = document.createElement('div');
        label.className = 'dm-section-label';
        label.textContent = 'Подписки';
        list.appendChild(label);
        followingNoChat.forEach(u => list.appendChild(buildFollowingRow(u)));
      }

      if (!threads.length && !followingNoChat.length) {
        list.innerHTML = `<div class="dm-empty"><span class="dm-empty-icon">💬</span>Нет сообщений.<br>Подпишись на кого-нибудь!</div>`;
      }
    }

    function buildThreadRow(thread) {
      const div = document.createElement('div');
      div.className = 'dm-thread';
      div.innerHTML = `
    <div class="dm-thread-avatar">
      ${escapeHTML(thread.username[0].toUpperCase())}
      ${thread.online ? '<div class="dm-thread-online"></div>' : ''}
    </div>
    <div class="dm-thread-info">
      <div class="dm-thread-name">@${escapeHTML(thread.username)}</div>
      <div class="dm-thread-last ${thread.unread ? 'unread-msg' : ''}">${escapeHTML(thread.last_message || 'Нет сообщений')}</div>
    </div>
    <div class="dm-thread-meta">
      <div class="dm-thread-time">${escapeHTML(thread.time || '')}</div>
      ${thread.unread ? `<div class="dm-unread-badge">${thread.unread}</div>` : ''}
    </div>`;
      div.onclick = () => openChat(thread.username, thread.user_id);
      return div;
    }

    function buildFollowingRow(user) {
      const div = document.createElement('div');
      div.className = 'dm-thread';
      div.innerHTML = `
    <div class="dm-thread-avatar">
      ${escapeHTML(user.username[0].toUpperCase())}
    </div>
    <div class="dm-thread-info">
      <div class="dm-thread-name">@${escapeHTML(user.username)}</div>
      <div class="dm-thread-last" style="color:rgba(255,255,255,.25);font-style:italic;">Нет сообщений</div>
    </div>
    <div class="dm-thread-meta">
      <div style="font-size:11px;color:rgba(74,144,217,.7);font-weight:600;">Написать</div>
    </div>`;
      div.onclick = () => openChatByUsername(user.username);
      return div;
    }

    async function openChatByUsername(username) {
      try {
        const res = await fetch(`/api/users/search?q=${encodeURIComponent(username)}`);
        const users = res.ok ? await res.json() : [];
        const found = users.find(u => u.username.toLowerCase() === username.toLowerCase());
        if (found) openChat(found.username, found.id);
        else showToast('Пользователь не найден', 'error');
      } catch (e) { showToast('Ошибка', 'error'); }
    }

    // search filter
    document.getElementById('dmSearchInput').addEventListener('input', function () {
      const q = this.value.trim().toLowerCase();
      if (!q) { renderThreads(allThreads); return; }
      const filteredThreads = allThreads.filter(t => t.username.toLowerCase().includes(q));
      const filteredFollowing = allFollowing.filter(f => f.username.toLowerCase().includes(q));
      const _orig = allFollowing;
      allFollowing = filteredFollowing;
      renderThreads(filteredThreads);
      allFollowing = _orig;
    });

    // ── CHAT ──
    async function openChat(username, userId) {
      currentChatUser = { username, userId };
      document.getElementById('chatName').textContent = '@' + username;
      document.getElementById('chatAvatar').firstChild.textContent = username[0].toUpperCase();
      document.getElementById('chatMessages').innerHTML = '';
      showScreen('chat');
      await loadChatHistory(userId || username);
    }

    async function loadChatHistory(userId) {
      try {
        const res = await fetch(`/api/dm/messages/${userId}`);
        if (!res.ok) return;
        const msgs = await res.json();
        let lastDate = '';
        msgs.forEach(m => {
          const msgDate = m.date || '';
          if (msgDate && msgDate !== lastDate) {
            appendDateDivider(msgDate); lastDate = msgDate;
          }
          appendMsg(m.text, m.is_mine, m.time, m.type, m.video_id);
        });
      } catch (e) { }
    }

    function appendDateDivider(dateStr) {
      const el = document.createElement('div');
      el.className = 'chat-date-divider';
      el.innerHTML = `<span>${escapeHTML(dateStr)}</span>`;
      document.getElementById('chatMessages').appendChild(el);
    }

    function appendMsg(text, isMe, time, type, videoId) {
      const container = document.getElementById('chatMessages');

      if (type === 'video' && videoId) {
        const wrap = document.createElement('div');
        wrap.className = 'chat-msg-wrap ' + (isMe ? 'me' : 'them');

        const card = document.createElement('div');
        card.className = 'chat-msg-video' + (isMe ? '' : ' them');
        card.innerHTML = `
      <div class="chat-video-thumb" style="background:linear-gradient(135deg,#1a2540,#111827);display:flex;align-items:center;justify-content:center;">
        <div class="chat-video-play">
          <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </div>
      </div>
      <div class="chat-video-info">
        <div class="chat-video-label">
          <svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
          Видео из Pardon
        </div>
        <div class="chat-video-time">${escapeHTML(time || '')}</div>
      </div>`;

        // Загружаем реальный URL и вставляем превью
        fetch(`/api/video/url/${videoId}`)
          .then(r => r.json())
          .then(data => {
            if (!data.ok || !data.url) return;
            const thumb = card.querySelector('.chat-video-thumb');
            thumb.innerHTML = `
          <video 
            src="${data.url}#t=0.5" 
            muted 
            playsinline 
            preload="metadata"
            style="width:100%;height:100%;object-fit:cover;pointer-events:none;"
          ></video>
          <div class="chat-video-play" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);">
            <svg viewBox="0 0 24 24" width="44" height="44" fill="rgba(255,255,255,.9)"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </div>`;
            thumb.style.position = 'relative';
          })
          .catch(() => { });

        card.onclick = () => { window.location.href = `/start#video-${videoId}`; };

        wrap.appendChild(card);
        container.appendChild(wrap);
      } else {
        const wrap = document.createElement('div');
        wrap.className = 'chat-msg-wrap ' + (isMe ? 'me' : 'them');
        wrap.innerHTML = `
      <div class="chat-msg ${isMe ? 'me' : 'them'}">${escapeHTML(text)}</div>
      <div class="chat-msg-time">${escapeHTML(time || '')}</div>`;
        container.appendChild(wrap);
      }

      container.scrollTop = container.scrollHeight;
    }

    // send
    const chatInput = document.getElementById('chatInput');
    const chatSendBtn = document.getElementById('chatSendBtn');

    chatInput.addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 100) + 'px';
      chatSendBtn.classList.toggle('disabled', !this.value.trim());
    });

    chatInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
    });

    chatSendBtn.addEventListener('click', sendMsg);

    async function sendMsg() {
      const text = chatInput.value.trim();
      if (!text || !currentChatUser) return;
      chatInput.value = '';
      chatInput.style.height = 'auto';
      chatSendBtn.classList.add('disabled');
      appendMsg(text, true, 'сейчас');
      try {
        await fetch('/api/dm/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ to_user_id: currentChatUser.userId, text })
        });
      } catch (e) { showToast('Ошибка отправки', 'error'); }
    }

    // ── NEW CHAT SHEET ──
    document.getElementById('newMsgBtn').addEventListener('click', () => {
      document.getElementById('newChatSheet').classList.add('open');
      document.getElementById('newChatSearch').focus();
    });

    function closeNewChatSheet() {
      document.getElementById('newChatSheet').classList.remove('open');
      document.getElementById('newChatSearch').value = '';
      document.getElementById('newChatList').innerHTML = '<div class="sheet-empty">Начни вводить имя пользователя</div>';
    }

    function handleSheetClick(e) {
      if (e.target === document.getElementById('newChatSheet')) closeNewChatSheet();
    }

    let _searchTimer = null;
    document.getElementById('newChatSearch').addEventListener('input', function () {
      const q = this.value.trim();
      clearTimeout(_searchTimer);
      if (!q) { document.getElementById('newChatList').innerHTML = '<div class="sheet-empty">Начни вводить имя пользователя</div>'; return; }
      _searchTimer = setTimeout(() => searchUsers(q), 300);
    });

    async function searchUsers(q) {
      try {
        const res = await fetch(`/api/users/search?q=${encodeURIComponent(q)}`);
        const users = res.ok ? await res.json() : [];
        const list = document.getElementById('newChatList');
        list.innerHTML = '';
        if (!users.length) { list.innerHTML = '<div class="sheet-empty">Пользователи не найдены</div>'; return; }
        users.forEach(u => {
          const row = document.createElement('div');
          row.className = 'sheet-user-row';
          row.innerHTML = `
        <div class="sheet-user-avatar">${escapeHTML(u.username[0].toUpperCase())}</div>
        <div>
          <div class="sheet-user-name">@${escapeHTML(u.username)}</div>
          <div class="sheet-user-handle">${escapeHTML(u.display_name || '')}</div>
        </div>`;
          row.onclick = () => { closeNewChatSheet(); openChat(u.username, u.id); };
          list.appendChild(row);
        });
      } catch (e) { }
    }

    // ── PROFILE ──
    async function loadProfile() {
      try {
        const res = await fetch('/api/profile');
        const data = await res.json();
        document.getElementById('userAvatar').textContent = data.username[0].toUpperCase();
      } catch (e) { }
    }

    // ── UNREAD BADGES ──
    async function loadUnread() {
      try {
        const res = await fetch('/api/notifications/unread');
        const data = await res.json();
        const badge = document.getElementById('notifBadge');
        if (data.count > 0) { badge.textContent = data.count; badge.classList.add('show'); }
        else badge.classList.remove('show');
      } catch (e) { }
    }

    // ── INIT ──
    window.addEventListener('load', () => {
      loadProfile();
      loadDMList();
      loadUnread();

      // если пришли с параметром ?user=username
      const params = new URLSearchParams(location.search);
      const u = params.get('user');
      const uid = params.get('uid');
      if (u) openChat(u, uid ? parseInt(uid) : null);

      // если пришли с ?user= но без uid — ищем по имени
      if (u && !uid) openChatByUsername(u);
    });
  </script>
</body>

</html>

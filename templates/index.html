<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>?_Pardon_?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
        }

        .line {
            position: absolute;
            top: 0;
            left: 55%;
            width: 1.4px;
            height: 100vh;
            background: #1f2a44;
            animation: lineFade 4s ease-in-out infinite;
        }

        .wrapper {
            position: absolute;
            top: 18%;
            left: 27%;
            transform: translate(-50%, -50%);
            display: inline-block;
            padding: 18px 24px;
            animation: top_down 3s ease infinite;
        }

        .title {
            font-size: 110px;
            font-family: cursive;
            color: #1f2a44;
            white-space: nowrap;
            user-select: none;
            line-height: 1;
        }

        .q {
            position: absolute;
            font-size: 28px;
            font-family: cursive;
            color: #1f2a44;
            opacity: 0.8;
            user-select: none;
        }

        .top-left {
            top: 2px;
            left: 2px;
            transform: rotate(-20deg);
            animation: pulse1 3s ease-in-out infinite;
        }

        .top-right {
            top: 10px;
            right: 0px;
            transform: rotate(7deg);
            animation: pulse2 3s ease-in-out infinite;
        }

        .bottom-left {
            bottom: 2px;
            left: 2px;
            transform: rotate(15deg);
            animation: pulse3 3s ease-in-out infinite;
        }

        .bottom-right {
            bottom: 2px;
            right: 2px;
            transform: rotate(-15deg);
            animation: pulse4 3s ease-in-out infinite;
        }

        .right-panel {
            position: absolute;
            top: 50%;
            left: 55%;
            width: 45%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .logo-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            opacity: 0;
            animation: fadeSlideIn 1s ease 0s forwards;
        }

        .btn-register {
            padding: 14px 42px;
            font-size: 26px;
            font-family: cursive;
            color: white;
            background: #1f2a44;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            letter-spacing: 1.5px;
            opacity: 0;
            animation: fadeSlideIn 0.7s ease 0.3s forwards, btnPulse 2.7s ease-in-out 1.3s infinite;
            transition: background 0.3s, transform 0.2s;
        }

        .btn-register:hover {
            background: #2e3f66;
            transform: scale(1.06);
        }

        .btn-login {
            padding: 14px 42px;
            font-size: 26px;
            font-family: cursive;
            color: white;
            background: #1f2a44;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            letter-spacing: 1.5px;
            opacity: 0;
            animation: fadeSlideIn 0.7s ease 0.3s forwards, btnPulse 2.7s ease-in-out 1.3s infinite;
            transition: background 0.3s, transform 0.2s;
        }

        .btn-login:hover {
            background: #2e3f66;
            transform: scale(1.06);
        }

        .tagline {
            display: inline-block;
            position: absolute;
            margin-top: 250px;
            left: 1%;
            transform: translateX(-50%);
            font-size: 20px;
            font-family: cursive;
            color: #3c414f;
            text-align: center;
            line-height: 1.9;
            opacity: 0.6;
            letter-spacing: 0.3px;
            white-space: nowrap;
            animation: fadeSlideIn 1s ease 0.4s both;
        }

        #crt {
            text-decoration: rgb(93, 93, 93);
        }

        .Created_By {
            color: rgb(93, 93, 93);
            font-family: cursive;
            animation: fadeSlideIn 0.7s ease 0.3s forwards;
        }

        .phones-section {
            position: absolute;
            top: 50%;
            /* центрируем по вертикали */
            left: 0;
            width: 55%;
            height: 520px;
            transform: translateY(-45%);
            /* поднимаем вверх */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .phones-stage {
            position: relative;
            width: 100%;
            height: 520px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Shared phone styles */
        .phone {
            position: absolute;
            bottom: 0;
            width: 160px;
            height: 310px;
            border-radius: 28px;
            border: 2px solid #1f2a44;
            overflow: hidden;
            background: #e8ecf4;
        }

        .phone img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Left phone — tilted, behind */
        .phone-left {
            left: calc(50% - 200px);
            transform: rotate(-14deg) translateY(-20px);
            /* было 30px, теперь -20px */
            z-index: 1;
            opacity: 0.75;
            animation: phoneFloat 4s ease-in-out infinite;
        }

        .phone-right {
            left: calc(50% + 40px);
            transform: rotate(14deg) translateY(-20px);
            /* то же самое */
            z-index: 1;
            opacity: 0.75;
            animation: phoneFloat 4s ease-in-out infinite reverse;
        }

        /* Center phone — upright, in front */
        .phone-center {
            left: calc(50% - 80px);
            z-index: 3;
            animation: phoneFloat 3.5s ease-in-out infinite;
            border-width: 2.5px;
        }

        .phone-ui {
            position: absolute;
            bottom: 24px;
            left: 16px;
            right: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .ui-bar {
            height: 6px;
            background: #1f2a44;
            border-radius: 8px;
            opacity: 0.25;
        }

        .ui-heart {
            position: absolute;
            top: 18px;
            right: 16px;
            font-size: 20px;
            color: #1f2a44;
            animation: heartBeat 1.8s ease-in-out infinite;
        }

        /* Floating badges */
        .badge-float {
            position: absolute;
            background: #1f2a44;
            color: white;
            font-family: cursive;
            font-size: 13px;
            padding: 6px 14px;
            border-radius: 20px;
            white-space: nowrap;
            z-index: 5;
            opacity: 0;
            animation: badgePop 0.5s ease forwards;
        }

        .badge-heart {
            top: 35%;
            left: 18%;
            /* было 4%, двигаем правее */
            animation: badgePop 0.5s ease 0.5s forwards, badgeDrift 5s ease-in-out 1s infinite;
        }

        .badge-star {
            top: 35%;
            right: 27%;
            /* было 4%, двигаем левее */
            animation: badgePop 0.5s ease 0.9s forwards, badgeDrift 5s ease-in-out 1.4s infinite reverse;
        }

        .badge-emoji {
            top: 58%;
            left: 14%;
            /* было 6%, двигаем правее */
            animation: badgePop 0.5s ease 1.3s forwards, badgeDrift 5s ease-in-out 1.8s infinite;
        }

        .feat {
            display: flex;
            align-items: center;
            gap: 7px;
            background: white;
            border: 1.5px solid #1f2a44;
            border-radius: 24px;
            padding: 7px 16px;
            font-family: cursive;
            font-size: 13px;
            color: #1f2a44;
            opacity: 0;
            animation: fadeSlideIn 0.6s ease forwards;
        }

        .feat:nth-child(1) {
            animation-delay: 0.2s;
        }

        .feat:nth-child(2) {
            animation-delay: 0.4s;
        }

        .feat:nth-child(3) {
            animation-delay: 0.6s;
        }

        .feat:nth-child(4) {
            animation-delay: 0.8s;
        }

        .feat-icon {
            font-size: 16px;
        }


        /* Animations */
        @keyframes phoneFloat {

            0%,
            100% {
                transform: rotate(-14deg) translateY(-20px);
            }

            50% {
                transform: rotate(-14deg) translateY(-38px);
            }
        }

        @keyframes phoneCenterFloat {

            0%,
            100% {
                transform: translateY(-20px);
            }

            50% {
                transform: translateY(-38px);
            }
        }

        @keyframes heartBeat {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.7;
            }

            50% {
                transform: scale(1.35);
                opacity: 1;
            }
        }

        @keyframes badgePop {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(6px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes badgeDrift {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes btnPulse {

            0%,
            100% {
                box-shadow: 0 0 0 0px rgba(31, 42, 68, 0.3);
            }

            50% {
                box-shadow: 0 0 0 10px rgba(31, 42, 68, 0);
            }
        }

        @keyframes pulse1 {

            0%,
            100% {
                transform: rotate(-20deg) scale(1);
                opacity: 0.8;
            }

            50% {
                transform: rotate(-28deg) scale(1.2);
                opacity: 1;
            }
        }

        @keyframes pulse2 {

            0%,
            100% {
                transform: rotate(7deg) scale(1);
                opacity: 0.8;
            }

            50% {
                transform: rotate(2deg) scale(1.2);
                opacity: 1;
            }
        }

        @keyframes pulse3 {

            0%,
            100% {
                transform: rotate(15deg) scale(1);
                opacity: 0.8;
            }

            50% {
                transform: rotate(22deg) scale(1.2);
                opacity: 1;
            }
        }

        @keyframes pulse4 {

            0%,
            100% {
                transform: rotate(-15deg) scale(1);
                opacity: 0.8;
            }

            50% {
                transform: rotate(-22deg) scale(1.2);
                opacity: 1;
            }
        }

        @keyframes lineFade {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        @keyframes top_down {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                transform: translate(-50%, -50%) scale(1.04);
            }
        }
    </style>
</head>

<body>

    <div class="line"></div>

    <div class="right-panel">
        <div class="logo-wrap">
            <svg width="110" height="110" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
                <circle cx="160" cy="160" r="152" fill="none" stroke="#1f2a44" stroke-width="1.5" opacity="0.15" />
                <circle cx="160" cy="160" r="138" fill="none" stroke="#1f2a44" stroke-width="1" opacity="0.07" />
                <circle cx="160" cy="160" r="125" fill="#1f2a44" />
                <circle cx="160" cy="160" r="113" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.07" />
                <rect x="100" y="88" width="28" height="144" rx="3" fill="#ffffff" />
                <path d="M 128 88 L 128 168 Q 218 168 218 128 Q 218 88 128 88 Z" fill="#ffffff" />
                <path d="M 128 103 L 128 153 Q 198 153 198 128 Q 198 103 128 103 Z" fill="#1f2a44" />
                <circle cx="222" cy="245" r="7" fill="#4a90d9" />
            </svg>
            <svg width="120" height="20" viewBox="0 0 160 24" xmlns="http://www.w3.org/2000/svg">
                <line x1="0" y1="12" x2="30" y2="12" stroke="#1f2a44" stroke-width="1" opacity="0.3" />
                <text x="80" y="17" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500"
                    fill="#1f2a44" letter-spacing="5">STUDIO</text>
                <line x1="130" y1="12" x2="160" y2="12" stroke="#1f2a44" stroke-width="1" opacity="0.3" />
            </svg>
        </div>

        <a href="/home/login" style="text-decoration:none;"><button class="btn-login" type="button">Login</button></a>
        <a href="/home/register" style="text-decoration:none;"><button class="btn-register"
                type="button">Register</button></a>
        <a href="/created_by" id="crt">
            <p class="Created_By">Created by Pardon Studio</p>
        </a>
    </div>

    <div class="wrapper">
        <h1 class="title">Pardon</h1>
        <h1 class="q top-left">?</h1>
        <h1 class="q top-right">?</h1>
        <h1 class="q bottom-left">?</h1>
        <h1 class="q bottom-right">?</h1>
    </div>
    <p class="tagline">🎬 Fun video platform for friends &nbsp;·&nbsp; 💬 Direct messages &amp; shared fun content ✨
    </p>
    <!-- Phones Section -->
    <div class="phones-section">

        <div class="phones-stage">

            <div class="phone phone-left">
                <img src="{{ url_for('static', filename='images/image_phone_1.png') }}" alt="">
            </div>

            <div class="phone phone-right">
                <img src="{{ url_for('static', filename='images/image_phone_3.png') }}" alt="">
            </div>

            <div class="phone phone-center">
                <img src="{{ url_for('static', filename='images/image_phone_2.png') }}" alt="">
                <div class="phone-ui">
                    <div class="ui-bar" style="width:70%"></div>
                    <div class="ui-bar" style="width:45%"></div>
                </div>
                <div class="ui-heart">♡</div>
            </div>

            <div class="badge-float badge-heart">♥ Liked by friends</div>
            <div class="badge-float badge-star">★ Top meme</div>
            <div class="badge-float badge-emoji">😂 🔥 🤩</div>

        </div>
    </div>
</body>

</html>
